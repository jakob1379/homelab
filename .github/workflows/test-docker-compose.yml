---
name: Test Docker Compose Configuration
on:
  push:
    branches: [main, refactor/**]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering
jobs:
  validate-config:
    name: Validate Compose and Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v5
      - name: Validate setup script syntax
        run: |
          bash -n setup-dev.sh
      - name: Run setup-dev script
        run: |
          bash setup-dev.sh
      - name: Validate main Docker Compose configuration (profile all)
        run: |
          DOMAIN=test.traefik.me docker compose --profile all config
      - name: Validate pods bootstrap Docker Compose configuration
        run: |
          DOMAIN=test.traefik.me docker compose -f docker-compose.pods.yml config
      - name: Validate referenced images exist for main stack (dry run)
        run: |-
          set -euo pipefail
          DOMAIN=test.traefik.me docker compose --profile all pull --dry-run
      - name: Validate referenced images exist for pods stack (dry run)
        run: |-
          set -euo pipefail
          DOMAIN=test.traefik.me docker compose -f docker-compose.pods.yml pull --dry-run
