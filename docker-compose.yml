---
# Root Docker Compose configuration for homelab
# Includes all stacks with clear separation of concerns
name: homelab
include:
  # Core infrastructure
  - services/networking.yml  # Traefik, Sablier, Whoami, AdGuard
  - services/rustfs.yml  # RustFS S3-compatible storage
  - services/monitoring.yml  # Dozzle

  # Developer tools
  - services/tools.yml  # IT Tools, CloudBeaver, BentoPDF
  - services/omni-tools.yml  # Omni Tools - self-hosted utilities
  - services/speedtest-tracker.yml  # Speedtest Tracker internet monitoring
  - services/vert.yml  # VERT local file converter

  # Applications with their dependencies
  - services/anythingllm.yml  # AnythingLLM private AI workspace
  - services/listmonk.yml  # Listmonk with Cloudflare tunnel
  - services/karakeep.yml  # Karakeep (formerly Hoarder) with Chrome and Meilisearch
  - services/immich.yml  # Immich photo management (optional experimental worker queue scaling)
  - services/paperless-ngx.yml  # Paperless-ngx document management
  - services/media.yml  # Jellyfin + media automation stack
  - services/homepage.yml  # Homepage dashboard
# Log rotation configuration to prevent disk fill
# Reference in services with: <<: *x-logging
x-logging:
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'
# Alternative: Configure log rotation globally in /etc/docker/daemon.json:
# {
#   "log-driver": "json-file",
#   "log-opts": {
#     "max-size": "10m",
#     "max-file": "3"
#   }
# }
