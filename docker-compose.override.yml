---
# Docker Compose Override for Local Development
# This file sets restart: unless-stopped for the main homelab stack
# Portainer + Dockhand live in docker-compose.pods.yml and are managed separately
#
# Usage: docker compose --profile all up -d
# Full local setup with the separate pods stack:
#   docker compose --profile all up -d
#   docker compose -f docker-compose.pods.yml up -d
#
services:
  # networking.yml
  traefik:
    restart: unless-stopped
  sablier:
    restart: unless-stopped
  whoami:
    restart: unless-stopped
  adguard:
    restart: unless-stopped
  netalertx:
    restart: unless-stopped

  # rustfs.yml
  rustfs:
    restart: unless-stopped

  # monitoring.yml
  dozzle:
    restart: unless-stopped

  # omni-tools.yml
  omni-tools:
    restart: unless-stopped

  # listmonk.yml
  listmonk-postgres:
    restart: unless-stopped
  listmonk:
    restart: unless-stopped
  cftunnel:
    restart: unless-stopped

  # karakeep.yml
  keep:
    restart: unless-stopped
  chrome:
    restart: unless-stopped
  meilisearch:
    restart: unless-stopped

  # immich.yml
  immich-postgres:
    restart: unless-stopped
  immich-server:
    restart: unless-stopped
  immich-microservices:
    restart: unless-stopped
  immich-machine-learning:
    restart: unless-stopped
  redis:
    restart: unless-stopped
  immich-queue-monitor:
    restart: unless-stopped

  # paperless-ngx.yml
  paperless-postgres:
    restart: unless-stopped
  paperless-web:
    restart: unless-stopped
  paperless-consumer:
    restart: unless-stopped
  paperless-redis:
    restart: unless-stopped
  paperless-gotenberg:
    restart: unless-stopped
  paperless-tika:
    restart: unless-stopped

  # media.yml
  gluetun:
    restart: unless-stopped
  jellyfin:
    restart: unless-stopped
  seerr:
    restart: unless-stopped
  qbittorrent:
    restart: unless-stopped
  sonarr:
    restart: unless-stopped
  radarr:
    restart: unless-stopped

  # tools.yml
  ittools:
    restart: unless-stopped
  cloudbeaver:
    restart: unless-stopped
  bentopdf:
    restart: unless-stopped

  # homepage.yml
  home:
    restart: unless-stopped
