---
services:
  speedtest-tracker:
    profiles: [apps, all]
    image: lscr.io/linuxserver/speedtest-tracker:v1.13.12-ls144
    restart: unless-stopped
    environment:
      - APP_KEY=${SPEEDTEST_APP_KEY:?Generate a key with `openssl rand -base64 32
        2>/dev/null`}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Copenhagen}
      - APP_URL=https://speed.${DOMAIN:-traefik.me}
      - ASSET_URL=https://speed.${DOMAIN:-traefik.me}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE="${SPEEDTEST_SCHEDULE:-17 */3 * * *}"
    volumes: [speedtest_tracker_data:/config]
    networks: [traefik_public]
    labels:
      - traefik.enable=true
      - traefik.http.routers.speedtest.rule=Host(`speed.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.speedtest.entrypoints=websecure
      - traefik.http.services.speedtest.loadbalancer.server.port=80
      - homepage.group=Networking
      - homepage.name=Speedtest Tracker
      - homepage.icon=mdi-speedometer
      - homepage.href=https://speed.${DOMAIN:-traefik.me}
      - homepage.description=Track internet speed and uptime history
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost/api/healthcheck
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
networks:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
volumes:
  speedtest_tracker_data:
