---
services:
  dockhand:
    image: fnsys/dockhand:v1.0.26
    environment:
      - DATA_DIR=${DOCKHAND_DATA_DIR:-/opt/dockhand}
      - TZ=${TZ:-Europe/Copenhagen}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKHAND_DATA_DIR:-/opt/dockhand}:${DOCKHAND_DATA_DIR:-/opt/dockhand}
    networks: [traefik_public]
    ports: [3000:3000]
    labels:
      - traefik.enable=true
      - traefik.http.routers.dockhand.rule=Host(`docker.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.dockhand.entrypoints=websecure
      - traefik.http.routers.dockhand.middlewares=startup-retry@file
      - traefik.http.services.dockhand.loadbalancer.server.port=3000
      - homepage.group=Developer
      - homepage.name=Dockhand
      - homepage.icon=docker.png
      - homepage.href=https://docker.${DOMAIN:-traefik.me}
      - homepage.description=Modern Docker management UI
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
networks:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
