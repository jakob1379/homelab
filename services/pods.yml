---
services:
  dockhand:
    image: fnsys/dockhand:v1.0.24
    environment: ['DATA_DIR=${DOCKHAND_DATA_DIR:-/opt/dockhand}']
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKHAND_DATA_DIR:-/opt/dockhand}:${DOCKHAND_DATA_DIR:-/opt/dockhand}
    networks: [traefik_public]
    ports: [3000:3000]
    labels:
      - sablier.enable=true
      - sablier.group=dockhand
      - homepage.group=Developer
      - homepage.name=Dockhand
      - homepage.icon=docker.png
      - homepage.href=https://docker.${DOMAIN:-traefik.me}
      - homepage.description=Modern Docker management UI
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
networks:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
