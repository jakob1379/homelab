---
services:
  keep:
    profiles: [apps, all]
    image: ghcr.io/karakeep-app/karakeep:0.31.0
    entrypoint: [/bin/sh, /usr/local/bin/karakeep-entrypoint.sh]
    restart: unless-stopped
    depends_on:
      chrome:
        condition: service_started
      meilisearch:
        condition: service_healthy
    networks: [traefik_public, keep]
    volumes:
      - karakeep_data:/data
      - ../config/karakeep/entrypoint.sh:/usr/local/bin/karakeep-entrypoint.sh:ro
    environment:
      OPENAI_SERVICE_TIER: flex
      INFERENCE_TEXT_MODEL: gpt-5.4-nano
      MEILI_ADDR: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Generate a key using `openssl rand -hex
        32 2>/dev/null`}
      BROWSER_WEB_URL: http://chrome:9222
      DATA_DIR: /data
      NEXTAUTH_URL: https://keep.${DOMAIN:-traefik.me}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Generate a key using `openssl rand -hex
        32 2>/dev/null`}
      OPENAI_API_KEY: ${KARAKEEP_OPENAI_API_KEY:-}
      KARAKEEP_OAUTH_WELLKNOWN_URL: ${KARAKEEP_OAUTH_WELLKNOWN_URL:-}
      OAUTH_CLIENT_SECRET: ${KARAKEEP_OAUTH_CLIENT_SECRET:-}
      OAUTH_CLIENT_ID: ${KARAKEEP_OAUTH_CLIENT_ID:-}
      OAUTH_PROVIDER_NAME: ${KARAKEEP_OAUTH_PROVIDER_NAME:-OIDC}
    labels:
      - sablier.enable=true
      - sablier.group=keep
      - homepage.group=Media & Files
      - homepage.name=Karakeep
      - homepage.icon=karakeep.png
      - homepage.href=https://keep.${DOMAIN:-traefik.me}
      - homepage.description=Save and organize interesting web links
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  chrome:
    profiles: [apps, all]
    image: gcr.io/zenika-hub/alpine-chrome@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f
    restart: unless-stopped
    networks: [keep]
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  meilisearch:
    profiles: [apps, all]
    image: getmeili/meilisearch:v1.13.3
    restart: unless-stopped
    networks: [keep]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Generate a key using `openssl rand -hex
        32 2>/dev/null`}
      MEILI_NO_ANALYTICS: 'true'
    volumes: [meilisearch_data:/meili_data]
    healthcheck:
      test: [CMD, curl, -f, http://127.0.0.1:7700/health]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
networks:
  keep:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
volumes:
  karakeep_data:
  meilisearch_data:
