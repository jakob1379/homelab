---
services:
  immich-postgres:
    profiles: [apps, all]
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      - POSTGRES_USER=${IMMICH_DB_USERNAME:-immich}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD:?Set IMMICH_DB_PASSWORD in .env, direnv,
        or Dockhand}
      - POSTGRES_DB=${IMMICH_DB_DATABASE_NAME:-immich}
      - TZ=${TZ:-Europe/Copenhagen}
    volumes: [immich_postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [immich]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Web UI/API
  immich-server:
    profiles: [apps, all]
    depends_on:
      immich-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: ghcr.io/immich-app/immich-server:v2.7.3
    command: [start.sh, immich]
    volumes: [immich_library:/usr/src/app/upload]
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USERNAME:-immich}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:?Set IMMICH_DB_PASSWORD in .env, direnv,
        or Dockhand}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
      - IMMICH_WORKERS_INCLUDE=api
    networks: [traefik_public, immich]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.immich.rule=Host(`photos.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.services.immich.loadbalancer.server.port=2283
      - homepage.group=Media & Files
      - homepage.name=Immich
      - homepage.icon=immich.png
      - homepage.href=https://photos.${DOMAIN:-traefik.me}
      - homepage.description=Family photo and video library
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Background workers
  immich-microservices:
    profiles: [apps, all]
    depends_on:
      immich-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: ghcr.io/immich-app/immich-server:v2.7.3
    command: [start.sh, microservices]
    volumes: [immich_library:/usr/src/app/upload]
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=${IMMICH_DB_USERNAME:-immich}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:?Generate a password using `openssl rand
        -base64 32 2>/dev/null`}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
      - IMMICH_WORKERS_EXCLUDE=api
    networks: [immich]
    restart: unless-stopped
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

  # ML processing - always on
  immich-machine-learning:
    profiles: [apps, all]
    depends_on:
      redis:
        condition: service_healthy
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.3
    volumes: [immich_model_cache:/cache]
    environment: [REDIS_HOSTNAME=redis]
    networks: [immich]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Queue storage - Always on
  redis:
    profiles: [apps, all]
    image: redis:7.4.8-alpine3.21
    volumes: [immich_redis:/data]
    networks: [immich]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
networks:
  immich:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
volumes:
  immich_library:
  immich_postgres_data:
  immich_model_cache:
  immich_redis:
