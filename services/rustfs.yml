---
services:
  rustfs:
    profiles: [infra, all]
    image: rustfs/rustfs:1.0.0-alpha.92
    depends_on:
      traefik:
        condition: service_healthy
    volumes: [rustfs_data:/data]
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:?Set RUSTFS_ACCESS_KEY in .env, direnv,
        or Dockhand}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY in .env, direnv,
        or Dockhand}
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_ADDRESS=:9001
    networks: [traefik_public]
    security_opt: [no-new-privileges:true]
    labels:
      - homepage.group=Storage & Data
      - homepage.name=RustFS
      - homepage.icon=rustfs.png
      - homepage.href=https://rustfs.${DOMAIN:-traefik.me}
      - homepage.description=Cloud file storage for backups
    restart: always
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9001/rustfs/console/index.html
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
networks:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
volumes:
  rustfs_data:
