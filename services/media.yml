---
services:
  gluetun:
    profiles: [apps, all]
    image: qmcgaw/gluetun:v3.41.1
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    networks:
      media:
        aliases: [torrent, sonarr, radarr]
      traefik_public:
    environment:
      - TZ=${TZ:-Europe/Copenhagen}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER:?Set OPENVPN_USER in .env, direnv, or Dockhand}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:?Set OPENVPN_PASSWORD in .env, direnv,
        or Dockhand}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
      - FIREWALL_INPUT_PORTS=8080,7878,8989,6881
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.torrent.rule=Host(`torrent.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.torrent.entrypoints=websecure
      - traefik.http.routers.torrent.service=torrent
      - traefik.http.services.torrent.loadbalancer.server.port=8080
      - traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  jellyfin:
    profiles: [apps, all]
    image: linuxserver/jellyfin:10.11.8
    networks: [traefik_public, media]
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - media_data:/data
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Copenhagen}
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_public
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.middlewares=startup-retry@file
      - traefik.http.routers.jellyfin.service=jellyfin
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - homepage.group=Media & Files
      - homepage.name=Jellyfin
      - homepage.icon=jellyfin.png
      - homepage.href=https://jellyfin.${DOMAIN:-traefik.me}
      - homepage.description=Stream and manage your media library
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  seerr:
    profiles: [apps, all]
    image: ghcr.io/seerr-team/seerr:v3.2.0
    init: true
    networks: [traefik_public, media]
    environment: ['TZ=${TZ:-Europe/Copenhagen}', LOG_LEVEL=info, PORT=5055]
    volumes: [seerr_config:/app/config]
    labels:
      - sablier.enable=true
      - sablier.group=seerr
      - homepage.group=Media & Files
      - homepage.name=Seerr
      - homepage.icon=jellyseerr.png
      - homepage.href=https://requests.${DOMAIN:-traefik.me}
      - homepage.description=Request movies and shows on demand
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status
          || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  immich-power-tools:
    profiles: [apps, all]
    image: ghcr.io/immich-power-tools/immich-power-tools:latest
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-server:
        condition: service_healthy
    networks: [traefik_public, immich]
    environment:
      - TZ=${TZ:-Europe/Copenhagen}
      - IMMICH_API_KEY=${IMMICH_API_KEY:-}
      - IMMICH_URL=${IMMICH_URL:-http://immich-server:2283}
      - EXTERNAL_IMMICH_URL=${EXTERNAL_IMMICH_URL:-}
      - DB_USERNAME=${IMMICH_DB_USERNAME:-immich}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:?Set IMMICH_DB_PASSWORD in .env, direnv,
        or Dockhand}
      - DB_HOST=immich-postgres
      - DB_PORT=5432
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME:-immich}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - POWER_TOOLS_ENDPOINT_URL=${POWER_TOOLS_ENDPOINT_URL:-https://immich-tools.${DOMAIN:-traefik.me}}
    volumes: [immich_power_tools_data:/app/data]
    labels:
      - sablier.enable=true
      - sablier.group=immich-power-tools
      - homepage.group=Media & Files
      - homepage.name=Immich Power Tools
      - homepage.icon=immich.png
      - homepage.href=https://immich-tools.${DOMAIN:-traefik.me}
      - homepage.description=Extra utilities for your Immich library
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  torrent:
    profiles: [apps, all]
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls448
    network_mode: service:gluetun
    depends_on: [gluetun]
    labels:
      - homepage.group=Media & Files
      - homepage.name=QBittorrent
      - homepage.icon=qbittorrent.png
      - homepage.href=https://torrent.${DOMAIN:-traefik.me}
      - homepage.description=Torrent client
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Copenhagen}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes: [qbittorrent_config:/config, media_data:/data]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  sonarr:
    profiles: [apps, all]
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls306
    network_mode: service:gluetun
    depends_on: [gluetun, torrent]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Copenhagen}
    volumes: [sonarr_config:/config, media_data:/data]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - homepage.group=Media & Files
      - homepage.name=Sonarr
      - homepage.icon=sonarr.png
      - homepage.href=https://sonarr.${DOMAIN:-traefik.me}
      - homepage.description=Track, download, and organize TV series automatically
  radarr:
    profiles: [apps, all]
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls298
    network_mode: service:gluetun
    depends_on: [gluetun, torrent]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Copenhagen}
    volumes: [radarr_config:/config, media_data:/data]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - homepage.group=Media & Files
      - homepage.name=Radarr
      - homepage.icon=radarr.png
      - homepage.href=https://radarr.${DOMAIN:-traefik.me}
      - homepage.description=Track, download, and organize movies automatically
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    networks: [traefik_public, media]
    environment: [PUID=1000, PGID=1000, TZ=Etc/UTC]
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      - homepage.group=Media & Files
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.png
      - homepage.href=https://prowlarr.${DOMAIN:-traefik.me}
      - homepage.description=Manage indexers and sync them with Sonarr and Radarr
    volumes: [prowlarr_config:/config]
    restart: unless-stopped
networks:
  media:
  immich:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
volumes:
  jellyfin_config:
  jellyfin_cache:
  media_data:
  seerr_config:
  qbittorrent_config:
  sonarr_config:
  radarr_config:
  prowlarr_config:
  immich_power_tools_data:
