---
services:
  listmonk-postgres:
    profiles: [apps, all]
    image: postgres:17.9-alpine3.23
    environment:
      - POSTGRES_USER=${LISTMONK_db__user:-listmonk}
      - POSTGRES_PASSWORD=${LISTMONK_db__password:?Set LISTMONK_db__password in .env,
        direnv, or Dockhand}
      - POSTGRES_DB=${LISTMONK_db__database:-listmonk}
      - TZ=Europe/Copenhagen
    volumes: [listmonk_postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U listmonk -d listmonk]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [listmonk]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  listmonk:
    profiles: [apps, all]
    image: listmonk/listmonk:v6.1.0
    depends_on:
      listmonk-postgres:
        condition: service_healthy
    environment:
      - TZ=Europe/Copenhagen
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_db__user=listmonk
      - LISTMONK_db__password=${LISTMONK_db__password:?Set LISTMONK_db__password in
        .env, direnv, or Dockhand}
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__host=listmonk-postgres
      - LISTMONK_db__port=5432
      - LISTMONK_db__ssl_mode=disable
      - LISTMONK_db__max_open=25
      - LISTMONK_db__max_idle=25
      - LISTMONK_db__max_lifetime=300s
    networks: [traefik_public, listmonk]
    labels:
      - sablier.enable=true
      - sablier.group=listmonk
      - homepage.group=Communication
      - homepage.name=Listmonk
      - homepage.icon=listmonk.png
      - homepage.href=https://listmonk.${DOMAIN:-traefik.me}
      - homepage.description=Send email newsletters to groups
    command:
      - sh
      - -c
      - ./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade
        --yes --config '' && ./listmonk --config ''
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  cftunnel:
    profiles: [tunnel]
    image: cloudflare/cloudflared:2025.1.0
    command: tunnel --no-autoupdate run
    restart: unless-stopped
    networks: [listmonk]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
volumes:
  listmonk_postgres_data:
networks:
  listmonk:
  traefik_public:
    name: traefik_public
    driver: bridge
    attachable: true
