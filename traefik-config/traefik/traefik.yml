---
accessLog: {}
log:
  level: INFO
global:
  checkNewVersion: true
  sendAnonymousUsage: false
api:
  dashboard: true
  insecure: false
ping:
  entryPoint: internal
entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: :443
    http:
      tls:
        certResolver: cfresolver
  internal:
    address: :8081
certificatesResolvers:
  cfresolver:
    acme:
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers: [1.1.1.1:53, 1.0.0.1:53]
providers:
  docker:
    # Use Docker Compose service label for clean service name extraction
    # Works with: homelab_traefik_1 -> traefik.<DOMAIN>
    defaultRule: Host(`{{ index .Labels "com.docker.compose.service" | default .Name }}.{{
      env "DOMAIN" }}`)
    exposedByDefault: false
    endpoint: unix:///var/run/docker.sock
    network: traefik_public
  file:
    directory: /etc/traefik/dyn/
    watch: true
experimental:
  plugins:
    sablier:
      moduleName: github.com/sablierapp/sablier
      version: v1.8.1
