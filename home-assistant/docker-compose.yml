---
volumes:
  ha_config:
services:
  ha:
    profiles: [apps, all, service]
    image: homeassistant/home-assistant:2026.4.1
    network_mode: host
    volumes:
      - ha_config:/config
      - ./configuration.yaml:/config/configuration.yaml:ro
      - ./automations.yaml:/config/automations.yaml:ro
      - ./scripts.yaml:/config/scripts.yaml:ro
      - ./scenes.yaml:/config/scenes.yaml:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ:-Europe/Copenhagen}
      - HA_CORS_ORIGIN=https://ha.${DOMAIN:-traefik.me}
    labels:
      - traefik.enable=true
      - traefik.http.routers.ha.rule=Host(`ha.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.ha.entrypoints=websecure
      - traefik.http.routers.ha.middlewares=netbird-users-only@file
      - traefik.http.services.ha.loadbalancer.server.port=8123
      - homepage.group=Smart Home
      - homepage.name=Home Assistant
      - homepage.icon=home-assistant.png
      - homepage.href=https://ha.${DOMAIN:-traefik.me}
      - homepage.description=Home automation and device control
    restart: unless-stopped
