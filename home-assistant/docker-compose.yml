---
volumes:
  ha_config:
services:
  ha:
    profiles: [service]
    image: homeassistant/home-assistant:2026.4.1
    volumes:
      - ha_config:/config
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /run/dbus:/run/dbus:ro
    environment: [TZ=Europe/Copenhagen]
    networks: [traefik_public]
    labels:
      - traefik.enable=true
      - traefik.http.routers.ha.rule=Host(`ha.${DOMAIN:-traefik.me}`)
      - traefik.http.routers.ha.entrypoints=websecure
      - traefik.http.services.ha.loadbalancer.server.port=8123
      - homepage.group=Smart Home
      - homepage.name=Home Assistant
      - homepage.icon=home-assistant.png
      - homepage.href=https://ha.${DOMAIN:-traefik.me}
      - homepage.description=Home automation and device control
networks:
  traefik_public:
    external: true
