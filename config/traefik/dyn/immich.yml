---
http:
  # ============================================
  # WEB UI ROUTER (User-facing)
  # ============================================
  routers:
    immich:
      rule: Host(`photos.{{ env "DOMAIN" }}`)
      entrypoints: [websecure]
      service: immich
      middlewares:
        - startup-retry@file

  # ============================================
  # SERVICES
  # ============================================
  services:
    immich:
      loadBalancer:
        servers:
          - url: http://immich-server:2283/
